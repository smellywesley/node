services:
  - type: web
    name: node-agentic-os-public-site
    runtime: static
    buildCommand: "cd deploy/public-site && npm ci && npm run test:cta && npm run build"
    staticPublishPath: ./deploy/public-site/dist
    previews:
      generation: automatic
    buildFilter:
      paths:
        - deploy/public-site/**
        - render.yaml
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      - path: /*
        name: Content-Security-Policy
        value: default-src 'self'; style-src 'self'; img-src 'self' data:; script-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'
