services:
  - type: web
    name: node-agentic-os-public-site
    runtime: static
    buildCommand: "cd deploy/public-site && npm ci && npm run configure:cta && npm run test:cta:deploy && npm run build"
    staticPublishPath: ./deploy/public-site/dist
    envVars:
      - key: NODE_PUBLIC_CONTACT_EMAIL
        value: owowesley@gmail.com
      - key: NODE_PUBLIC_PILOT_CONTACT_URL
        value: https://calendly.com/wesleyong2004/node-pilot-fit-check
      - key: NODE_PUBLIC_PILOT_PAYMENT_LINK
        value: https://buy.stripe.com/bJeeVfc0h6cJ95m9dK7g400
    previews:
      generation: automatic
    buildFilter:
      paths:
        - deploy/public-site/**
        - render.yaml
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      - path: /*
        name: Content-Security-Policy
        value: default-src 'self'; style-src 'self'; img-src 'self' data:; script-src 'self' 'sha256-WTa/tSilaNzxb8WJQbhveNZ5JuSjlJJev9wGf4DNbtg='; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'
