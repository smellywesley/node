name: approval-smoke
image: agentos/approval-smoke:local
task: Write a reviewed artifact only after operator approval.
pricing:
  input_usd_per_million: 0
  output_usd_per_million: 0
implementation:
  adapter: jsonlines-tools
  command:
    - python
    - /app/agent.py
  env: {}
mounts:
  - source: work/approval-workspace
    target: /workspace
    read_only: true
capabilities:
  tools:
    - fs.write
  filesystem_read:
    - /workspace
  filesystem_write:
    - /workspace
  network_destinations: []
  secrets: []
budget:
  max_tokens: 0
  max_cost_usd: 0
  max_duration_seconds: 30
  max_concurrency: 1
  max_children: 0
approval_rules:
  - action: fs.write
    match: /workspace
retry:
  max_attempts: 1
  backoff_seconds: 0
checkpoint:
  enabled: false
  interval_seconds: 0
  resume_on_start: false
